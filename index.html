<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyRent vs Trade Me — Price Comparison</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    header p {
      color: #666;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 860px;
    }

    .input-group {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .input-wrap {
      flex: 1;
    }

    .input-prefix {
      position: relative;
    }

    .input-prefix span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 1rem;
      font-weight: 500;
    }

    .input-prefix input {
      width: 100%;
      padding: 11px 12px 11px 28px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a1a1a;
      transition: border-color 0.15s;
      outline: none;
    }

    .input-prefix input:focus {
      border-color: #5046e4;
    }

    button[type="submit"] {
      padding: 11px 24px;
      background: #5046e4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button[type="submit"]:hover {
      background: #3d34c9;
    }

    .results {
      margin-top: 28px;
      display: none;
    }

    .results.visible {
      display: block;
    }

    .rent-label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 14px;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      border-bottom: 2px solid #eee;
    }

    thead th:not(:first-child) {
      text-align: right;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 14px 14px;
      vertical-align: top;
    }

    tbody td:not(:first-child) {
      text-align: right;
    }

    .package-name {
      font-weight: 600;
      color: #1a1a1a;
    }

    .package-desc {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
    }

    .price {
      font-weight: 500;
      color: #333;
    }

    .price-myrent {
      font-weight: 700;
      color: #1a1a1a;
    }

    .savings-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .savings-badge.more-expensive {
      background: #fdecea;
      color: #c62828;
    }

    .savings-amount {
      font-size: 0.78rem;
      color: #2e7d32;
      margin-top: 2px;
    }

    .savings-amount.more-expensive {
      color: #c62828;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <h1>MyRent vs Trade Me</h1>
  <p>See how much you save advertising through MyRent</p>
</header>

<div class="card">
  <form id="calcForm">
    <div class="input-group">
      <div class="input-wrap">
        <label for="rentInput">Weekly rent</label>
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="rentInput" placeholder="e.g. 550" min="1" step="1" required>
        </div>
      </div>
      <button type="submit">Calculate</button>
    </div>
  </form>

  <div class="results" id="results">
    <div class="rent-label" id="rentLabel"></div>
    <table>
      <thead>
        <tr>
          <th>Package</th>
          <th>MyRent</th>
          <th>Realestate.co.nz</th>
          <th>Trade Me Direct</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <p class="footer-note">All prices exclude GST. Savings shown vs equivalent Trade Me Direct package.</p>
  </div>
</div>

<script>
  // Trade Me Direct pricing — ex GST for display, inc GST shown in small print
  const GST = 1.15;
  const exGst = n => Math.round(n / GST * 100) / 100;

  const tmPricing = [
    { maxRent: 199,  base: exGst(119), baseGst: 119, premium: exGst(179), premiumGst: 179 },
    { maxRent: 299,  base: exGst(119), baseGst: 119, premium: exGst(179), premiumGst: 179 },
    { maxRent: 399,  base: exGst(169), baseGst: 169, premium: exGst(259), premiumGst: 259 },
    { maxRent: 599,  base: exGst(219), baseGst: 219, premium: exGst(339), premiumGst: 339 },
    { maxRent: 799,  base: exGst(279), baseGst: 279, premium: exGst(409), premiumGst: 409 },
    { maxRent: 999,  base: exGst(299), baseGst: 299, premium: exGst(449), premiumGst: 449 },
    { maxRent: Infinity, base: exGst(339), baseGst: 339, premium: exGst(509), premiumGst: 509 },
  ];

  // MyRent pricing ex GST
  const myrentBase    = 75;
  const myrentPremium = 250;

  // Realestate.co.nz flat rates (inc GST) — converted to ex GST for display
  const reaBase    = exGst(49);
  const reaBaseGst = 49;
  const reaPremium    = exGst(124);
  const reaPremiumGst = 124;

  function getTMPrices(rent) {
    for (const tier of tmPricing) {
      if (rent <= tier.maxRent) return tier;
    }
    return tmPricing[tmPricing.length - 1];
  }

  function fmt(n) {
    return '$' + n.toFixed(2).replace(/\.00$/, '');
  }

  function savingsPct(myrent, tm) {
    return ((tm - myrent) / tm * 100).toFixed(1);
  }

  document.getElementById('calcForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const rent = parseFloat(document.getElementById('rentInput').value);
    if (!rent || rent <= 0) return;

    const tm = getTMPrices(rent);
    const results = document.getElementById('results');
    const tableBody = document.getElementById('tableBody');
    const rentLabel = document.getElementById('rentLabel');

    rentLabel.textContent = `Rent: $${rent}/week`;

    const packages = [
      {
        name: 'Base',
        desc: 'Standard listing',
        myrent: myrentBase,
        tm: tm.base,
        tmGst: tm.baseGst,
        rea: reaBase,
        reaGst: reaBaseGst,
      },
      {
        name: 'Premium',
        desc: 'Featured listing',
        myrent: myrentPremium,
        tm: tm.premium,
        tmGst: tm.premiumGst,
        rea: reaPremium,
        reaGst: reaPremiumGst,
      },
    ];

    tableBody.innerHTML = packages.map(pkg => {
      const diff = pkg.tm - pkg.myrent;
      const cheaper = diff > 0;
      const pct = Math.abs((diff / pkg.tm) * 100).toFixed(1);
      const myrentDisplay = pkg.name === 'Premium'
        ? `<div class="price-myrent">${fmt(pkg.myrent)}</div><div class="package-desc">$75 base + $175 premium add-on</div>`
        : `<div class="price-myrent">${fmt(pkg.myrent)}</div>`;
      const diffLabel = cheaper
        ? `<div class="savings-amount">Save ${fmt(diff)}</div><div><span class="savings-badge">${pct}% cheaper</span></div>`
        : `<div class="savings-amount more-expensive">Costs ${fmt(Math.abs(diff))} more</div><div><span class="savings-badge more-expensive">${pct}% more expensive</span></div>`;
      return `
        <tr>
          <td>
            <div class="package-name">${pkg.name}</div>
            <div class="package-desc">${pkg.desc}</div>
          </td>
          <td>
            ${myrentDisplay}
            ${diffLabel}
          </td>
          <td>
            ${(() => {
              const reaDiff = pkg.tm - pkg.rea;
              const reaCheaper = reaDiff > 0;
              const reaPct = Math.abs((reaDiff / pkg.tm) * 100).toFixed(1);
              const reaDiffLabel = reaCheaper
                ? `<div class="savings-amount">Save ${fmt(reaDiff)}</div><div><span class="savings-badge">${reaPct}% cheaper</span></div>`
                : `<div class="savings-amount more-expensive">Costs ${fmt(Math.abs(reaDiff))} more</div><div><span class="savings-badge more-expensive">${reaPct}% more expensive</span></div>`;
              return `<div class="price">${fmt(pkg.rea)}</div>
            <div class="package-desc">${fmt(pkg.reaGst)} incl. GST</div>
            ${reaDiffLabel}`;
            })()}
          </td>
          <td>
            <div class="price">${fmt(pkg.tm)}</div>
            <div class="package-desc">${fmt(pkg.tmGst)} incl. GST</div>
          </td>
        </tr>
      `;
    }).join('');

    results.classList.add('visible');
  });
</script>
</body>
</html>
